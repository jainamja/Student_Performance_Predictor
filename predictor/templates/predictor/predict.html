<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
        }

        .card{
            margin-top: 40px;
            border-radius: 20px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    🎓 Student Performance Predictor
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Study Hours</label>
                        <input type="number" step="0.1" class="form-control" name="study_hours" required>
                    </div>

                    <div class="mb-3">
                        <label>Attendance (%)</label>
                        <input type="number" class="form-control" name="attendance" required>
                    </div>

                    <div class="mb-3">
                        <label>Previous Scores</label>
                        <input type="number" class="form-control" name="previous_scores" required>
                    </div>

                    <div class="mb-3">
                        <label>Sleep Hours</label>
                        <input type="number" step="0.1" class="form-control" name="sleep_hours" required>
                    </div>

                    <div class="mb-3">
                        <label>Internet Access</label>
                        <select class="form-control" name="internet_access">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Extra Activities</label>
                        <select class="form-control" name="extra_activities">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Family Support</label>
                        <select class="form-control" name="family_support">
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Motivation Level (1-10)</label>
                        <input type="number" class="form-control" name="motivation_level" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Predict Performance
                    </button>
                    <a href="/history/" class="btn btn-dark w-100 mt-3">
                        View Prediction History
                    </a>

                </form>

                {% if prediction %}

                    <div class="alert alert-success mt-4 text-center">

                    <h4>Predicted Performance</h4>

                    <h1>
                    {{ prediction }}%
                    </h1>

                    <h3>
                    {{ category }}
                    </h3>

                    <p class="mt-3">
                    {{ suggestion }}
                    </p>

                    </div>

                {% endif %}

            </div>

        </div>

    </div>

</div>

</body>
</html>
